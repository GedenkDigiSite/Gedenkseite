<!DOCTYPE html>
<html lang="de">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Digitales Gedenken</title>
    <style>
        :root {
            --bg-main: #040507;        /* Angepasst an das tiefe Schwarz der Gedenkseiten */
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --accent: #e53e3e;
            --layer-mid: rgba(16, 20, 28, 0.75); /* Perfekter Glassmorphismus-Abgleich */
            --layer-border: rgba(255, 255, 255, 0.06);
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; 
            color: var(--text-main); 
            background-color: var(--bg-main); 
            background-image: radial-gradient(circle at 50% 30%, rgba(229, 62, 62, 0.08) 0%, transparent 60%);
            padding: 40px 24px; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .main-card {
            max-width: 450px;
            text-align: center;
            background: var(--layer-mid);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid var(--layer-border);
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.6);
        }
        .icon-glow {
            width: 50px;
            height: 50px;
            margin: 0 auto 25px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 20px rgba(229, 62, 62, 0.4);
        }
        .icon-glow::after { 
            content: '🕯️'; 
            font-size: 24px; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
        }
        h1 { font-size: 1.8rem; font-weight: 300; letter-spacing: 1px; margin-bottom: 15px; }
        p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 0; }
        .separator { width: 40px; height: 1px; background-color: var(--layer-border); margin: 25px auto; }
        footer { margin-top: 40px; font-size: 0.8rem; color: var(--text-muted); text-align: center; }
        footer p { opacity: 0.6; }
        .footer-links { margin-top: 12px; }
        .footer-links a { color: var(--text-muted); text-decoration: none; margin: 0 10px; opacity: 0.6; transition: color 0.2s, opacity 0.2s; }
        .footer-links a:hover { color: var(--accent); opacity: 1; }
    </style>
</head>
<body>
    <main class="main-card">
        <!-- aria-label beschreibt die Kerze barrierefrei für Sehgeschädigte -->
        <div class="icon-glow" role="img" aria-label="Gedenkkerze"></div>
        <h1>Digitales Gedenken</h1>
        <p>Dies ist ein privates Portal für digitale Gedenkseiten.</p>
        <div class="separator" aria-hidden="true"></div>
        <p>Der Zugang zu den Profilen ist geschützt und ausschließlich über den gescannten QR-Code am jeweiligen Gedenkort möglich.</p>
    </main>
    <footer>
        <p>&copy; 2026 Digitales Gedenken</p>
        <nav class="footer-links" aria-label="Rechtliche Links">
            <a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutzerklärung</a>
        </nav>
    </footer>
</body>
</html>
